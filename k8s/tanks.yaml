apiVersion: v1
kind: Namespace
metadata:
  name: tanks
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tanks-server
  namespace: tanks
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tanks-server
  template:
    metadata:
      labels:
        app: tanks-server
    spec:
      containers:
        - name: server
          image: tanks-server:local
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: CORS_ORIGIN
              value: "http://localhost:30080"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: tanks-server
  namespace: tanks
spec:
  type: NodePort
  selector:
    app: tanks-server
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tanks-client
  namespace: tanks
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tanks-client
  template:
    metadata:
      labels:
        app: tanks-client
    spec:
      containers:
        - name: client
          image: tanks-client:local
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: tanks-client
  namespace: tanks
spec:
  type: NodePort
  selector:
    app: tanks-client
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
